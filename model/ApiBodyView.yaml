cube:
  name: ApiBodyView
  sql: SELECT org, ts, first_ts, req_key, req, res, url, host, method, channel FROM default.access_sample_raw FINAL
       WHERE {filter.host} AND {filter.urlRoute} AND {filter.method}
       ORDER BY first_ts DESC

  segments:
    org:
      sql: org = ''

  dimensions:
    ts:
      sql: ts
      type: time
      title: 时间

    firstTs:
      sql: first_ts
      type: time
      title: 首次时间

    id:
      sql: cityHash64(method, host, url)
      type: string
      title: ID

    request:
      sql: "if(substr(JSONExtractString(req,'Method'),-3) IN ['C2S','S2C','TCP','WS'], jsonMergePatch(req, toJSONString(map('Body', tryBase64Decode(JSONExtractString(req, 'Body'))))), req)"
      type: string
      title: 请求报文

    response:
      sql: res
      type: string
      title: 响应报文

    urlRoute:
      sql: url
      type: string
      title: URL路由

    host:
      sql: host
      type: string
      title: 域名

    method:
      sql: method
      type: string
      title: 请求方式

    channel:
      sql: channel
      type: string
      title: 应用

    appName:
      sql: "multiIf(arrayExists(x -> position(assumeNotNull(url), '/') != 1 or startsWith(assumeNotNull(url), x[1]), dictGet(host_dict, 'info', assumeNotNull(host))), arrayFirst(x -> position(assumeNotNull(url), '/') != 1 or startsWith(assumeNotNull(url), x[1]), dictGet(host_dict, 'info', assumeNotNull(host)))[2], arrayExists(x -> startsWith(assumeNotNull(url), x[1]), dictGet(host_dict, 'info', splitByRegexp(':\\d+$', assumeNotNull(host))[1] || ':*')), arrayFirst(x -> startsWith(assumeNotNull(url), x[1]), dictGet(host_dict, 'info', splitByRegexp(':\\d+$', assumeNotNull(host))[1] || ':*'))[2], host)"
      type: string
      title: 应用名称

    api:
      sql: "method || ' ' || host || url"
      type: string
      title: API

    hostUrl:
      sql: "host || url"
      type: string
      title: 域名+URL

    # 对比数据：当前版本，形式 key:value\n...
    reqKeyCurDataForDiff:
      sql: "if(notEmpty(assumeNotNull(JSONExtractRaw(req, 'QueryMap'))), '#Query\\n' || arrayStringConcat(arrayMap(k -> k || ':' || JSONExtractString(assumeNotNull(JSONExtractRaw(req, 'QueryMap')), k), JSONExtractKeys(assumeNotNull(JSONExtractRaw(req, 'QueryMap')))),'\\n') || '\\n', '') || if(notEmpty(assumeNotNull(JSONExtractRaw(req, 'Body'))), '#Body\\n' || arrayStringConcat(arrayMap(k -> k || ':' || JSONExtractString(assumeNotNull(JSONExtractRaw(req, 'Body')), k), JSONExtractKeys(assumeNotNull(JSONExtractRaw(req, 'Body')))),'\\n'), '')"
      type: string
      title: 当前版本数据

    # 对比数据：旧版本，若当前参数之前无历史则赋默认值 -
    reqKeyDiffData:
      sql: "if(assumeNotNull(lagInFrame(req) OVER (ORDER BY first_ts))='', '-', if(notEmpty(JSONExtractRaw(assumeNotNull(lagInFrame(req) OVER (ORDER BY first_ts)), 'QueryMap')), '#Query\\n' || arrayStringConcat(arrayMap(k -> k || ':' || JSONExtractString(if(JSONHas(assumeNotNull(JSONExtractRaw(req, 'QueryMap')), k), assumeNotNull(JSONExtractRaw(req, 'QueryMap')), JSONExtractRaw(assumeNotNull(lagInFrame(req) OVER (ORDER BY first_ts)), 'QueryMap')), k), JSONExtractKeys(JSONExtractRaw(assumeNotNull(lagInFrame(req) OVER (ORDER BY first_ts)), 'QueryMap'))),'\\n') || '\\n', '') || if(notEmpty(JSONExtractRaw(assumeNotNull(lagInFrame(req) OVER (ORDER BY first_ts)), 'Body')), '#Body\\n' || arrayStringConcat(arrayMap(k -> k || ':' || JSONExtractString(if(JSONHas(assumeNotNull(JSONExtractRaw(req, 'Body')), k), assumeNotNull(JSONExtractRaw(req, 'Body')), JSONExtractRaw(assumeNotNull(lagInFrame(req) OVER (ORDER BY first_ts)), 'Body')), k), JSONExtractKeys(JSONExtractRaw(assumeNotNull(lagInFrame(req) OVER (ORDER BY first_ts)), 'Body'))),'\\n'), ''))"
      type: string
      title: 旧版本数据
